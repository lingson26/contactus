<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상담 신청</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: #f4f7fb;
      color: #111827;
    }

    body {
      padding: 24px 16px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      width: 100%;
    }

    .cardTop {
      margin-bottom: 28px;
    }

    .cardTop h2 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.3;
      font-weight: 800;
      color: #111827;
    }

    .cardTop p {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: #6b7280;
    }

    .form {
      width: 100%;
    }

    .field {
      margin-top: 24px;
    }

    .field:first-child {
      margin-top: 0;
    }

    .fieldHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .label {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }

    .req {
      color: #ef4444;
    }

    .hint {
      font-size: 12px;
      color: #6b7280;
      text-align: right;
      line-height: 1.5;
    }

    input[type="text"],
    input[type="tel"],
    textarea {
      width: 100%;
      max-width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 15px;
      line-height: 1.5;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="tel"]:focus,
    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .chipGroup {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chipCheck {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      transition: all 0.2s ease;
      user-select: none;
    }

    .chipCheck input {
      display: none;
    }

    .chipCheck.active {
      background: #eff6ff;
      border-color: #2563eb;
      color: #1d4ed8;
    }

    .consent {
      margin-top: 24px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      border-radius: 14px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      cursor: pointer;
    }

    .consent input[type="checkbox"] {
      margin-top: 2px;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .consent-wrap {
      flex: 1;
      min-width: 0;
    }

    .consent-main {
      font-size: 14px;
      line-height: 1.6;
      color: #374151;
    }

    .consent-main b {
      color: #111827;
    }

    .consent-main em {
      display: block;
      margin-top: 4px;
      font-style: normal;
      color: #6b7280;
      font-size: 13px;
    }

    .error {
      margin-top: 8px;
      font-size: 13px;
      color: #dc2626;
      line-height: 1.5;
      min-height: 20px;
    }

    .invalid {
      border-color: #dc2626 !important;
      box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.08) !important;
      background: #fffafa;
    }

    .submit {
      margin-top: 28px;
      width: 100%;
      border: 0;
      border-radius: 14px;
      background: #9ca3af;
      color: white;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 18px;
      cursor: not-allowed;
      transition: background 0.2s ease, transform 0.15s ease, opacity 0.2s ease;
      opacity: 0.9;
    }

    .submit.enabled {
      background: #2563eb;
      cursor: pointer;
      opacity: 1;
    }

    .submit.enabled:hover {
      background: #1d4ed8;
    }

    .submit.enabled:active {
      transform: translateY(1px);
    }

    /* 모바일 반응형 */
    @media (max-width: 768px) {
      body {
        padding: 16px 12px;
      }

      .card {
        padding: 20px 16px;
        border-radius: 16px;
      }

      .cardTop {
        margin-bottom: 22px;
      }

      .cardTop h2 {
        font-size: 24px;
        line-height: 1.35;
      }

      .cardTop p {
        font-size: 13px;
        line-height: 1.6;
      }

      .field {
        margin-top: 20px;
      }

      .fieldHead {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      .label {
        font-size: 15px;
      }

      .hint {
        text-align: left;
        font-size: 11px;
      }

      input[type="text"],
      input[type="tel"],
      textarea {
        font-size: 16px; /* iOS 자동 확대 방지 */
        padding: 14px 14px;
        border-radius: 12px;
      }

      .chipGroup {
        gap: 8px;
      }

      .chipCheck {
        width: 100%;
        justify-content: flex-start;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 13px;
      }

      .consent {
        padding: 14px 12px;
        border-radius: 12px;
      }

      .consent-main {
        font-size: 13px;
      }

      .consent-main em {
        font-size: 12px;
      }

      .submit {
        font-size: 15px;
        padding: 15px 14px;
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="cardTop">
        <h2>상담 신청</h2>
        <p>
          필요한 내용을 남겨주시면 확인 후 빠르게 연락드리겠습니다.
        </p>
      </div>

      <form class="form" id="consultForm" novalidate>
        <!-- 이름 -->
        <div class="field">
          <div class="fieldHead">
            <label class="label" for="name">이름 <span class="req">*</span></label>
            <div class="hint">담당자 또는 신청자 이름을 입력해 주세요.</div>
          </div>
          <input id="name" name="name" type="text" placeholder="홍길동" required />
          <div class="error" id="nameError" aria-live="polite"></div>
        </div>

        <!-- 연락처 -->
        <div class="field">
          <div class="fieldHead">
            <label class="label" for="contact">연락처 <span class="req">*</span></label>
            <div class="hint">연락 받으실 연락처를 입력해 주세요.</div>
          </div>
          <input
            id="contact"
            name="contact"
            type="tel"
            inputmode="tel"
            placeholder="010-1234-5678"
            required
          />
          <div class="error" id="contactError" aria-live="polite"></div>
        </div>

        <!-- 문의 유형 -->
        <div class="field">
          <div class="fieldHead">
            <div class="label">문의 유형 <span class="req">*</span></div>
            <div class="hint">해당되는 항목을 선택해 주세요.</div>
          </div>

          <div class="chipGroup">
            <label class="chipCheck">
              <input type="radio" name="topic" value="서비스 문의" />
              서비스 문의
            </label>

            <label class="chipCheck">
              <input type="radio" name="topic" value="견적 문의" />
              견적 문의
            </label>

            <label class="chipCheck">
              <input type="radio" name="topic" value="제휴 문의" />
              제휴 문의
            </label>

            <label class="chipCheck">
              <input type="radio" name="topic" value="기타 문의" />
              기타 문의
            </label>
          </div>

          <div class="error" id="topicError" aria-live="polite"></div>
        </div>

        <!-- 문의 내용 -->
        <div class="field">
          <div class="fieldHead">
            <label class="label" for="message">문의 내용 <span class="req">*</span></label>
            <div class="hint">필요한 내용을 구체적으로 적어주시면 더 빠르게 안내드릴 수 있어요.</div>
          </div>
          <textarea
            id="message"
            name="message"
            placeholder="예) 단지명 / 세대수 / 현재 사용 시스템 / 도입 검토 내용
예) OO아파트 / 800세대 / 아파트아이 사용 중 / 커뮤니티 운영 통합 검토"
            required
          ></textarea>
          <div class="error" id="messageError" aria-live="polite"></div>
        </div>

        <!-- 동의 -->
        <label class="consent">
          <input type="checkbox" id="consent" required />
          <div class="consent-wrap">
            <div class="consent-main">
              <b>[필수]</b> 개인정보 수집 및 이용에 동의합니다.
              <em>상담 외 다른 목적으로 사용되지 않습니다.</em>
            </div>
          </div>
        </label>
        <div class="error" id="consentError" aria-live="polite"></div>

        <button type="submit" class="submit" id="submitBtn" disabled>상담 신청하기</button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById("consultForm");
    const submitBtn = document.getElementById("submitBtn");

    const nameInput = document.getElementById("name");
    const contactInput = document.getElementById("contact");
    const messageInput = document.getElementById("message");
    const consentInput = document.getElementById("consent");
    const topicInputs = document.querySelectorAll('input[name="topic"]');
    const chipLabels = document.querySelectorAll(".chipCheck");

    const nameError = document.getElementById("nameError");
    const contactError = document.getElementById("contactError");
    const topicError = document.getElementById("topicError");
    const messageError = document.getElementById("messageError");
    const consentError = document.getElementById("consentError");

    function clearErrors() {
      nameError.textContent = "";
      contactError.textContent = "";
      topicError.textContent = "";
      messageError.textContent = "";
      consentError.textContent = "";
    }

    function isValidPhone(phone) {
      const cleaned = phone.replace(/[^0-9]/g, "");
      return cleaned.length >= 10 && cleaned.length <= 11;
    }

    function updateChipState() {
      chipLabels.forEach((label) => {
        const input = label.querySelector("input");
        label.classList.toggle("active", input.checked);
      });
    }

    function validateName(showError = false) {
      const ok = nameInput.value.trim().length > 0;
      nameInput.classList.toggle("invalid", showError && !ok);
      nameError.textContent = showError && !ok ? "이름을 입력해 주세요." : "";
      return ok;
    }

    function validateContact(showError = false) {
      const value = contactInput.value.trim();
      const ok = value.length > 0 && isValidPhone(value);
      contactInput.classList.toggle("invalid", showError && !ok);

      if (showError) {
        if (!value) {
          contactError.textContent = "연락처를 입력해 주세요.";
        } else if (!isValidPhone(value)) {
          contactError.textContent = "올바른 연락처 형식으로 입력해 주세요.";
        } else {
          contactError.textContent = "";
        }
      } else {
        contactError.textContent = "";
      }

      return ok;
    }

    function validateTopic(showError = false) {
      const selectedTopic = document.querySelector('input[name="topic"]:checked');
      topicError.textContent = showError && !selectedTopic ? "문의 유형을 선택해 주세요." : "";
      return !!selectedTopic;
    }

    function validateMessage(showError = false) {
      const ok = messageInput.value.trim().length > 0;
      messageInput.classList.toggle("invalid", showError && !ok);
      messageError.textContent = showError && !ok ? "문의 내용을 입력해 주세요." : "";
      return ok;
    }

    function validateConsent(showError = false) {
      const ok = consentInput.checked;
      consentError.textContent = showError && !ok ? "개인정보 수집 및 이용에 동의해 주세요." : "";
      return ok;
    }

    function updateSubmitButton() {
      const isFormValid =
        validateName(false) &&
        validateContact(false) &&
        validateTopic(false) &&
        validateMessage(false) &&
        validateConsent(false);

      submitBtn.disabled = !isFormValid;
      submitBtn.classList.toggle("enabled", isFormValid);
    }

    nameInput.addEventListener("input", updateSubmitButton);
    contactInput.addEventListener("input", updateSubmitButton);
    messageInput.addEventListener("input", updateSubmitButton);
    consentInput.addEventListener("change", updateSubmitButton);

    topicInputs.forEach((input) => {
      input.addEventListener("change", () => {
        updateChipState();
        updateSubmitButton();
      });
    });

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      clearErrors();

      const isValid =
        validateName(true) &&
        validateContact(true) &&
        validateTopic(true) &&
        validateMessage(true) &&
        validateConsent(true);

      if (!isValid) {
        updateSubmitButton();
        return;
      }

      alert("상담 신청이 완료되었습니다.");
      form.reset();
      updateChipState();
      clearErrors();
      updateSubmitButton();
    });

    updateChipState();
    updateSubmitButton();
  </script>
</body>
</html>
